name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: "Publish built distributions to PyPI"
        required: false
        default: false
        type: boolean
      release_version:
        description: "Optional version override (x.y.z). Required when publishing."
        required: false
        type: string

jobs:
  validate_release:
    name: Validate release inputs
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.validate.outputs.release_version }}
    steps:
      - name: Validate version input
        id: validate
        shell: bash
        run: |
          version="${{ inputs.release_version }}"
          publish="${{ inputs.publish_to_pypi }}"

          if [[ "$publish" == "true" && -z "$version" ]]; then
            echo "release_version is required when publish_to_pypi=true" >&2
            exit 1
          fi

          if [[ -n "$version" && ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_version must match x.y.z (for example 1.2.3)." >&2
            exit 1
          fi

          echo "release_version=$version" >> "$GITHUB_OUTPUT"

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: validate_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply version override
        if: ${{ needs.validate_release.outputs.release_version != '' }}
        shell: pwsh
        run: |
          $path = "pyemsi/__init__.py"
          $version = "${{ needs.validate_release.outputs.release_version }}"
          $content = Get-Content -Raw -Path $path
          $updated = $content -replace '__version__\s*=\s*"[^"]+"', "__version__ = `"$version`""

          if ($updated -eq $content) {
            throw "Could not find __version__ assignment in $path"
          }

          Set-Content -Path $path -Value $updated
          Write-Host "Using package version $version"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.21.3

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    needs: validate_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply version override
        if: ${{ needs.validate_release.outputs.release_version != '' }}
        shell: pwsh
        run: |
          $path = "pyemsi/__init__.py"
          $version = "${{ needs.validate_release.outputs.release_version }}"
          $content = Get-Content -Raw -Path $path
          $updated = $content -replace '__version__\s*=\s*"[^"]+"', "__version__ = `"$version`""

          if ($updated -eq $content) {
            throw "Could not find __version__ assignment in $path"
          }

          Set-Content -Path $path -Value $updated
          Write-Host "Using package version $version"

      - name: Install build dependencies
        run: python -m pip install build cython numpy

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  merge_artifacts:
    name: Merge all artifacts
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-dist
          path: dist/

  publish_pypi:
    name: Publish to PyPI
    needs: [validate_release, merge_artifacts]
    if: ${{ inputs.publish_to_pypi }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyemsi
    permissions:
      id-token: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: all-dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
